<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Tab</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
  /* Spacing system: 4px baseline grid — every gap, margin and padding is a
     multiple of 4. Nested radii follow the concentric rule:
     inner radius = outer radius − inset. */
  * { box-sizing: border-box; }
  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    background: var(--surface);
    color: var(--text);
    font: 14px/1.4 var(--font-ui);
  }
  body {
    display: grid;
    place-items: start center;
    padding: clamp(48px, 12vh, 112px) 28px 48px;
    overflow-y: auto;
  }
  .newtab {
    width: min(600px, 100%);
  }
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-bottom: 32px;
  }
  .mark {
    width: 44px;
    height: 44px;
    color: var(--teal);
  }
  .mark svg { width: 100%; height: 100%; display: block; }
  h1 {
    margin: 16px 0 8px;
    font: 700 32px/1.05 var(--font-ui);
    letter-spacing: 0;
  }
  .sub {
    margin: 0;
    color: var(--text-muted);
    font: italic 400 15px/1.35 var(--font-ui);
  }
  /* Bar: 52px outer, 1px border + 4px padding = 5px inset on every side,
     so the 42px button sits with exactly 5px above, below and to the right.
     Button radius 7 = bar radius 12 − 5px inset (concentric). */
  .search {
    height: 52px;
    display: grid;
    grid-template-columns: 1fr 42px;
    align-items: center;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    background: color-mix(in srgb, #fff 72%, var(--control-bg));
    box-shadow: 0 12px 36px rgba(84, 67, 41, 0.08);
    margin-bottom: 48px;
    transition: border-color 160ms var(--ease-out), box-shadow 160ms var(--ease-out);
  }
  .search:focus-within {
    border-color: color-mix(in srgb, var(--accent) 60%, var(--border-subtle));
    box-shadow:
      0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent),
      0 14px 38px rgba(84, 67, 41, 0.10);
  }
  input {
    min-width: 0;
    width: 100%;
    height: 100%;
    padding: 0 12px;
    border: 0;
    background: transparent;
    color: var(--text);
    font: 440 15px/1 var(--font-mono);
  }
  input:focus { outline: none; }
  input::placeholder {
    color: var(--text-muted);
    opacity: 0.78;
    font: italic 400 15px/1 var(--font-ui);
  }
  button {
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    border: 0;
    border-radius: 7px;
    background: var(--accent);
    color: var(--cream);
    cursor: pointer;
    transition: transform 120ms var(--ease-out), background-color 120ms ease-out;
  }
  button:hover { background: var(--umber); }
  button:active { transform: scale(0.96); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button svg {
    width: 19px;
    height: 19px;
    display: block;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  h2 {
    margin: 0;
    font: 700 15px/1 var(--font-ui);
  }
  .hint {
    color: var(--text-muted);
    font: italic 400 12px/1 var(--font-ui);
  }
  .recent-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .recent {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 12px;
    align-items: center;
    padding: 12px;
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    background: color-mix(in srgb, #fff 58%, var(--surface));
    color: inherit;
    text-decoration: none;
    transition: border-color 120ms ease-out, background-color 120ms ease-out, box-shadow 120ms ease-out;
  }
  .recent:hover {
    border-color: color-mix(in srgb, var(--accent) 48%, var(--border-subtle));
    background: #fff;
    box-shadow: 0 2px 10px rgba(84, 67, 41, 0.07);
  }
  .recent:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .recent-icon {
    width: 36px;
    height: 36px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    color: var(--cream);
    font: 700 14px/1 var(--font-ui);
    text-transform: uppercase;
  }
  /* With a real favicon the slot becomes a neutral white tile. */
  .recent-icon.has-favicon {
    background: #fff;
    border: 1px solid var(--border-subtle);
  }
  .recent-icon img {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: block;
  }
  .recent-body { min-width: 0; }
  .recent-title,
  .recent-url {
    display: block;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .recent-title {
    font: 700 13px/1.25 var(--font-ui);
  }
  .recent-url {
    margin-top: 4px;
    color: var(--text-muted);
    font: 440 11px/1.25 var(--font-mono);
  }
  .empty {
    grid-column: 1 / -1;
    min-height: 72px;
    display: grid;
    place-items: center;
    padding: 16px;
    border: 1px dashed var(--border-subtle);
    border-radius: 12px;
    color: var(--text-muted);
    font: italic 400 13px/1.35 var(--font-ui);
    text-align: center;
  }
  @media (max-width: 560px) {
    body { padding-inline: 16px; }
    h1 { font-size: 27px; }
    .search { grid-template-columns: 1fr 38px; height: 48px; }
    button { width: 38px; height: 38px; }
    .recent-grid { grid-template-columns: minmax(0, 1fr); }
  }
  @media (prefers-reduced-motion: reduce) {
    .search, button, .recent { transition: none; }
    button:active { transform: none; }
  }
</style>
</head>
<body>
<main class="newtab">
  <section class="brand" aria-labelledby="title">
    <div class="mark" aria-hidden="true">
      <!-- Fedsurf brand symbol (symbol.svg) -->
      <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M218.807 105.212C217.399 129.128 216.695 141.086 223.269 143.809C229.842 146.532 237.801 137.58 253.719 119.676L309.658 56.7584C316.267 49.3252 319.571 45.6085 323.884 45.482C328.197 45.3555 331.714 48.872 338.747 55.9051L344.102 61.2603C351.136 68.2945 354.653 71.8115 354.526 76.1252C354.399 80.4388 350.682 83.743 343.246 90.3515L280.328 146.272C262.418 162.189 253.464 170.148 256.186 176.722C258.909 183.296 270.869 182.593 294.788 181.186L378.826 176.245C388.756 175.661 393.721 175.369 396.86 178.33C400 181.29 400 186.264 400 196.211V203.788C400 213.736 400 218.709 396.86 221.67C393.72 224.63 388.755 224.338 378.825 223.754L294.785 218.807C270.867 217.399 258.908 216.695 256.184 223.269C253.461 229.843 262.415 237.802 280.322 253.72L343.247 309.656C350.682 316.266 354.4 319.57 354.526 323.884C354.652 328.198 351.135 331.715 344.099 338.748L338.739 344.107C331.705 351.139 328.188 354.655 323.875 354.528C319.562 354.401 316.258 350.684 309.65 343.25L253.721 280.327C237.803 262.418 229.843 253.463 223.27 256.186C216.696 258.909 217.399 270.869 218.807 294.789L223.754 378.825C224.338 388.755 224.63 393.72 221.67 396.86C218.709 400 213.736 400 203.788 400H196.21C186.263 400 181.29 400 178.33 396.86C175.369 393.721 175.661 388.756 176.245 378.826L181.186 294.788C182.593 270.869 183.296 258.909 176.722 256.186C170.148 253.464 162.189 262.418 146.272 280.328L90.3515 343.246C83.743 350.682 80.4388 354.399 76.1252 354.526C71.8116 354.653 68.2945 351.136 61.2603 344.102L55.9051 338.747C48.872 331.714 45.3555 328.197 45.482 323.884C45.6085 319.571 49.3252 316.267 56.7584 309.658L119.676 253.719C137.58 237.801 146.533 229.842 143.809 223.269C141.086 216.695 129.128 217.399 105.212 218.807L21.1752 223.754C11.2449 224.338 6.27963 224.63 3.1398 221.67C-2.64645e-05 218.709 0 213.736 0 203.788V196.211C0 186.264 -3.79086e-05 181.29 3.13957 178.33C6.27918 175.369 11.2441 175.661 21.174 176.245L105.206 181.186C129.124 182.593 141.083 183.296 143.806 176.722C146.528 170.148 137.574 162.19 119.666 146.272L56.7547 90.3535C49.3188 83.7442 45.6008 80.4395 45.4743 76.1255C45.3478 71.8116 48.8657 68.2947 55.9014 61.2609L61.2615 55.9023C68.2953 48.8705 71.8121 45.3546 76.1251 45.4816C80.4381 45.6086 83.7419 49.3254 90.3497 56.7589L146.273 119.671C162.19 137.577 170.149 146.53 176.722 143.807C183.296 141.085 182.593 129.126 181.187 105.209L176.245 21.174C175.661 11.2442 175.369 6.27922 178.33 3.13961C181.29 0 186.264 0 196.211 0H203.788C213.736 0 218.709 0 221.67 3.13983C224.63 6.27965 224.338 11.2448 223.754 21.1752L218.807 105.212Z" fill="currentColor"/>
      </svg>
    </div>
    <h1 id="title">New Tab</h1>
    <p class="sub">Search Federate, open a site, or jump back into recent pages.</p>
  </section>

  <form class="search" id="search">
    <input id="q" type="text" spellcheck="false" autocomplete="off"
           placeholder="Search, or enter a fed:// or https:// address"
           aria-label="Search or address">
    <button type="submit" aria-label="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 10m-6.5 0a6.5 6.5 0 1 0 13 0a6.5 6.5 0 1 0 -13 0"></path>
        <path d="M21 21l-6 -6"></path>
      </svg>
    </button>
  </form>

  <section aria-labelledby="recent-title">
    <div class="section-head">
      <h2 id="recent-title">Recent</h2>
      <span class="hint" id="recent-count"></span>
    </div>
    <div class="recent-grid" id="recent"></div>
  </section>
</main>

<script>
const RECENT_KEY = 'fedsurf.recent';
const TILE_COLORS = ['var(--teal)', 'var(--navy)', 'var(--olive)', 'var(--terracotta)', 'var(--amber)'];
const input = document.getElementById('q');
const recentEl = document.getElementById('recent');
const countEl = document.getElementById('recent-count');

function destination(value) {
  const text = value.trim();
  if (!text) return '';
  if (/^[a-z][a-z0-9+.-]*:\/\//i.test(text)) return text;
  const head = text.split(/[/?#]/, 1)[0];
  if (head.includes('.') && !/\s/.test(head)) return `https://${text}`;
  return `fed://fed.busca/?q=${encodeURIComponent(text).replace(/%20/g, '+')}`;
}

function hostOf(url) {
  try { return new URL(url).host; } catch (_) { return ''; }
}

// Same host-hash palette as the sidebar tiles, so a site keeps one color.
function tileColor(url) {
  const host = hostOf(url);
  if (!host) return 'var(--accent)';
  let hash = 0;
  for (let i = 0; i < host.length; i++) hash = (hash * 31 + host.charCodeAt(i)) >>> 0;
  return TILE_COLORS[hash % TILE_COLORS.length];
}

// Explicit favicon from the tab, else the site's /favicon.ico (same
// fallback the sidebar uses).
function faviconFor(item) {
  if (item.favicon) return item.favicon;
  try {
    const u = new URL(item.url);
    if (['http:', 'https:', 'fed:'].includes(u.protocol) && u.host) {
      return `${u.protocol}//${u.host}/favicon.ico`;
    }
  } catch (_) { /* not a URL */ }
  return '';
}

function letterFor(item) {
  return (hostOf(item.url) || item.title || '?').slice(0, 1);
}

function displayUrl(url) {
  return url.replace(/^https?:\/\//, '');
}

function readRecent() {
  try {
    const items = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
    return Array.isArray(items) ? items.filter((x) => x && x.url).slice(0, 8) : [];
  } catch (_) {
    return [];
  }
}

function letterTile(icon, item) {
  icon.classList.remove('has-favicon');
  icon.textContent = letterFor(item);
  icon.style.background = tileColor(item.url);
}

function iconFor(item) {
  const icon = document.createElement('span');
  icon.className = 'recent-icon';
  const src = faviconFor(item);
  if (!src) {
    letterTile(icon, item);
    return icon;
  }
  icon.classList.add('has-favicon');
  const img = document.createElement('img');
  img.alt = '';
  img.addEventListener('error', () => {
    img.remove();
    letterTile(icon, item);
  });
  img.src = src;
  icon.append(img);
  return icon;
}

function renderRecent() {
  const recent = readRecent();
  countEl.textContent = recent.length ? `${recent.length} pages` : '';
  recentEl.textContent = '';
  if (!recent.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'Recent pages will appear here after you browse.';
    recentEl.append(empty);
    return;
  }
  for (const item of recent) {
    const a = document.createElement('a');
    a.className = 'recent';
    a.href = item.url;
    const body = document.createElement('span');
    body.className = 'recent-body';
    const title = document.createElement('span');
    title.className = 'recent-title';
    title.textContent = item.title || hostOf(item.url) || item.url;
    const url = document.createElement('span');
    url.className = 'recent-url';
    url.textContent = displayUrl(item.url);
    body.append(title, url);
    a.append(iconFor(item), body);
    recentEl.append(a);
  }
}

document.getElementById('search').addEventListener('submit', (event) => {
  event.preventDefault();
  const target = destination(input.value);
  if (target) window.location.href = target;
});

renderRecent();
</script>
</body>
</html>
