<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fedsurf</title>
<style>
  html, body { background: #FBF6F0; color: #21211F; }
</style>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/toolbar.css">
<link rel="stylesheet" href="css/sidebar.css">
<script>
  // Pre-paint: restore the persisted sidebar state so it never flashes open.
  if (localStorage.getItem('fedsurf.sidebar.collapsed') === '1') {
    document.documentElement.classList.add('collapsed');
  }
</script>
</head>
<body>
<div class="app">
  <!-- Tabler Icons (outline), MIT — https://tabler.io/icons -->
  <header class="toolbar" data-tauri-drag-region>
    <button id="back" class="icon-btn" aria-label="Go back" title="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0"/><path d="M5 12l6 6"/><path d="M5 12l6 -6"/></svg>
    </button>
    <button id="forward" class="icon-btn" aria-label="Go forward" title="Forward">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0"/><path d="M13 18l6 -6"/><path d="M13 6l6 6"/></svg>
    </button>
    <button id="reload" class="icon-btn" aria-label="Reload page" title="Reload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.933 13.041a8 8 0 1 1 -9.925 -8.788c3.899 -1 7.935 1.007 9.425 4.747"/><path d="M20 4v5h-5"/></svg>
    </button>
    <button id="home" class="icon-btn" aria-label="Go to home.fed" title="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>
    </button>
    <div class="address">
      <span id="scheme" class="scheme" data-kind="none">
        <svg id="scheme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></svg>
        <span id="scheme-label"></span>
      </span>
      <input id="url" type="text" spellcheck="false" autocomplete="off"
             placeholder="Search Federate, or enter a fed:// or https:// address"
             aria-label="Address and search">
    </div>
  </header>

  <aside class="sidebar" id="sidebar" data-tauri-drag-region>
    <div class="tab-list" id="tab-list" role="tablist" aria-orientation="vertical"
         aria-label="Open tabs" data-tauri-drag-region></div>
    <div class="sidebar-footer">
      <button id="new-tab" class="side-row" aria-label="New tab" title="New Tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg>
        <span class="side-label">New Tab</span>
      </button>
      <button id="toggle-sidebar" class="side-row" aria-expanded="true" aria-controls="tab-list"
              aria-label="Collapse sidebar" title="Collapse sidebar">
        <svg class="icon-collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"/><path d="M9 4v16"/><path d="M15 10l-2 2l2 2"/></svg>
        <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"/><path d="M9 4v16"/><path d="M14 10l2 2l-2 2"/></svg>
        <span class="side-label">Collapse</span>
      </button>
    </div>
  </aside>

  <div class="content-spacer"></div>
</div>

<div id="progress" class="progress" data-loading="false" role="progressbar" aria-label="Page loading"></div>
<div id="tooltip" class="tooltip" role="tooltip"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
